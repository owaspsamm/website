{{ if hugo.IsProduction }}
{{- $label := "" -}}
{{- if reflect.IsMap . -}}
  {{- $label = .label -}}
{{- else -}}
  {{- $label = .RelPermalink -}}
{{- end -}}
{{- $src := printf "https://static.scarf.sh/a.png?x-pxid=6e76dfd3-e2e4-4864-a63b-0b361639db63&label=%s" ($label | urlquery) -}}
<span class="scarf-pixel" data-scarf-src="{{ $src }}" hidden aria-hidden="true"></span>
{{ end }}
