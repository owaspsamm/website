{{/* Render hook for markdown links.
     External links (http/https) automatically open in a new tab
     and display an external-link indicator. */}}
{{- $url := .Destination -}}
{{- $isExternal := or (hasPrefix $url "http://") (hasPrefix $url "https://") -}}
<a href="{{ $url }}"
  {{- if $isExternal }} target="_blank" rel="noopener"{{ end -}}
  {{- with .Title }} title="{{ . }}"{{ end -}}
>{{ .Text }}{{- if $isExternal }}<svg class="external-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>{{- end -}}</a>
